# Pre-commit hooks for the automations repo.
# See https://pre-commit.com for more information.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - tomli>=1.0
          - tomli-w>=1.0
          - rich>=13.0
        # MyPy is scoped to parts/src/ only because PEP 723 scripts in init/
        # import automations-parts via inline path dependencies that mypy
        # cannot resolve.
        files: ^parts/src/
